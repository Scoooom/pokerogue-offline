name: Build PokéRogue Offline IPA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Clone PokeRogue
        run: git clone --recurse-submodules --depth 1 --branch main https://github.com/pagefaultgames/pokerogue.git pokerogue-src

      - name: Get PokeRogue version
        id: pokerogue_version
        run: |
          VERSION=$(node -p "require('./pokerogue-src/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Copy and resize app icon
        run: |
          sips -z 1024 1024 pokerogue-src/public/logo512.png --out PokeRogueOffline/Assets.xcassets/AppIcon.appiconset/icon.png

      - name: Install PokeRogue dependencies
        working-directory: pokerogue-src
        run: pnpm install

      - name: Build PokeRogue
        working-directory: pokerogue-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build

      - name: Copy dist into Xcode project
        run: |
          mkdir -p PokeRogueOffline/web
          cp -r pokerogue-src/dist/* PokeRogueOffline/web/

      - name: Build Xcode project (unsigned)
        run: |
          xcodebuild \
            -project PokeRogueOffline.xcodeproj \
            -scheme PokeRogueOffline \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$PWD/build

      - name: Find built app
        run: find . -name "*.app" -type d

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r "build/PokéRogue Offline.app" Payload/
          zip -r PokéRogueOffline.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokéRogueOffline
          path: PokéRogueOffline.ipa
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pokerogue_version.outputs.version }}-${{ github.run_number }}
          name: PokéRogue Offline v${{ steps.pokerogue_version.outputs.version }}
          files: PokéRogueOffline.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
